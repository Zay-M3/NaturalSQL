name: Run Tests

on:
  # Run tests for pushes and pull requests targeting main.
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest build

      - name: Packaging smoke check
        run: |
          python -m build
          python -m venv .pkg-smoke-venv
          . .pkg-smoke-venv/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python -c "import naturalsql; print(naturalsql.__name__)"

      - name: Run pytest
        run: pytest
