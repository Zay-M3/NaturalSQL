name: Publish to PyPI

on:
  # Publish only when a GitHub Release is published.
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          pyproject = pathlib.Path("pyproject.toml")
          project = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          package_version = str(project["project"]["version"]).strip()

          release_tag = os.environ["RELEASE_TAG"].strip()
          normalized_tag = release_tag[1:] if release_tag.lower().startswith("v") else release_tag

          if package_version != normalized_tag:
              print(
                  "Version mismatch: "
                  f"pyproject.toml has '{package_version}', release tag is '{release_tag}'."
              )
              sys.exit(1)

          print(f"Version check passed: {package_version}")
          PY

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish package to PyPI
        # Requires repository secret: PYPI_API_TOKEN
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
