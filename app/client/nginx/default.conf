# Basic worker defaults (inherited from image)

# Preserve real client IP from reverse proxy/LB when present
map $http_x_forwarded_for $client_real_ip {
    ""      $remote_addr;
    default $http_x_forwarded_for;
}

# Force HTTPS when proxy indicates plain HTTP
map $http_x_forwarded_proto $redirect_to_https {
    default 1;
    https   0;
}

# Request rate zones
limit_req_zone $client_real_ip zone=auth_limit:10m rate=5r/m;
limit_req_zone $client_real_ip zone=chat_limit:10m rate=5r/m;

upstream backend_upstream {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # If traffic reaches this Nginx over HTTP at the edge, redirect to HTTPS.
    if ($redirect_to_https = 1) {
        return 301 https://$host$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://naturalsql.online; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Backend API reverse proxy (private Docker network)
    location /api/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://backend_upstream/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/chat/message {
        limit_req zone=chat_limit burst=10 nodelay;

        proxy_pass http://backend_upstream/api/chat/message;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static assets and SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
